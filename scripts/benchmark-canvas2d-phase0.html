<!-- Hidden DOM measurement container -->

<script>
// ============================================
// Test Data: 라틴 50 + CJK 30 + 혼합 20 = 100 문장
// ============================================

const TEST_FONTS = [

const LATIN_TEXTS = [

const CJK_TEXTS = [
  "안녕하세요 반갑습니다",
  "프로젝트 관리 도구",
  "사용자 인터페이스 디자인",

  "인공지능과 머신러닝의 미래",
  "모바일 앱 개발 가이드라인",
  "보안 정책 및 개인정보 보호",
  "성능 테스트 결과 보고서",
  "시스템 요구사항 분석",
  "こんにちは世界",
  "東京都渋谷区神宮前",
  "日本語テキストの折り返しテスト",
  "ソフトウェア開発プロセス",
  "品質管理システムの導入",
  "你好世界",
  "中文文本换行测试",
  "软件开发流程管理",
  "人工智能技术应用",
  "云计算服务架构设计",
  "가나다라마바사아자차카타파하",
  "ㄱㄴㄷㄹㅁㅂㅅㅇㅈㅊㅋㅌㅍㅎ",
  "あいうえおかきくけこ",
  "アイウエオカキクケコ",
  "一二三四五六七八九十",
  "가격: ₩50,000원",
  "日付: 2024年3月15日",
  "전화번호: 010-1234-5678",
  "メールアドレス: test@example.jp",
  "배송 예정일: 3~5 영업일",
];

const MIXED_TEXTS = [
  "Hello 안녕하세요 World 세계",
  "React 19 컴포넌트 개발",
  "TypeScript 5 타입 시스템",
  "Canvas 2D API 텍스트 측정 벤치마크",
  "CanvasKit WASM 기반 렌더링",
  "Zustand 상태 관리 패턴",
  "Tailwind CSS v4 스타일링",
  "Vite + pnpm 모노레포",
  "60fps Canvas レンダリング",
  "HarfBuzz テキストシェーピング",
  "API Response: { status: 200, data: '성공' }",
  "Error Code: E001 - 사용자 인증 실패",
  "Version 2.0 릴리즈 노트",
  "TODO: Fix the overflow-wrap bug in text renderer",
  "PR #123: Canvas 2D 측정기 도입",
  "font-family: 'Pretendard', sans-serif",
  "width: 100px; height: auto",
  "border-radius: 8px 8px 0 0",
  "transform: translateX(-50%) 중앙 정렬",
  "grid-template-columns: repeat(3, 1fr) 그리드",
];

const ALL_TEXTS = [...LATIN_TEXTS, ...CJK_TEXTS, ...MIXED_TEXTS];

const CONTAINER_WIDTHS = [100, 150, 200, 250, 300, 400];

// ============================================
// Gate 1: Canvas 2D vs CSS DOM width (≤ 1px)
// ============================================

function measureDOMWidth(text, fontFamily, fontSize, fontWeight) {
  const el = document.getElementById('dom-measure');
  el.style.fontFamily = fontFamily;
  el.style.fontSize = fontSize + 'px';
  el.style.fontWeight = fontWeight;
  el.style.whiteSpace = 'nowrap';
  el.style.display = 'inline';
  el.style.lineHeight = 'normal';
  el.style.letterSpacing = 'normal';
  el.style.wordSpacing = 'normal';
  el.textContent = text;
  return el.getBoundingClientRect().width;
}

function measureCanvas2DWidth(ctx, text, fontFamily, fontSize, fontWeight) {
  ctx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;
  return ctx.measureText(text).width;
}

function runGate1(ctx) {
  const results = [];
  let maxDiff = 0;
  let totalDiff = 0;
  let count = 0;
  let failCount = 0;

  for (const font of TEST_FONTS) {
    for (const text of ALL_TEXTS) {
      const domW = measureDOMWidth(text, font.family, font.size, font.weight);
      const c2dW = measureCanvas2DWidth(ctx, text, font.family, font.size, font.weight);
      const diff = Math.abs(domW - c2dW);

      count++;
      totalDiff += diff;
      if (diff > maxDiff) maxDiff = diff;
      if (diff > 1.0) failCount++;

      if (diff > 0.5) {
        results.push({
          text: text.length > 40 ? text.slice(0, 40) + '...' : text,
          font: `${font.weight} ${font.size}px ${font.family}`,
          domW: domW.toFixed(2),
          c2dW: c2dW.toFixed(2),
          diff: diff.toFixed(3),
        });
      }
    }
  }

  return {
    pass: failCount === 0,
    maxDiff,
    avgDiff: totalDiff / count,
    total: count,
    failCount,
    outliers: results.sort((a, b) => parseFloat(b.diff) - parseFloat(a.diff)).slice(0, 20),
  };
}

// ============================================
// Gate 2: Intl.Segmenter CJK vs CSS line-break
// ============================================

const segmenter = new Intl.Segmenter(undefined, { granularity: 'word' });

function isCJKCodePoint(cp) {
  return (cp >= 0x4E00 && cp <= 0x9FFF) ||
    (cp >= 0x3040 && cp <= 0x309F) ||
    (cp >= 0x30A0 && cp <= 0x30FF) ||
    (cp >= 0xAC00 && cp <= 0xD7AF) ||
    (cp >= 0x3400 && cp <= 0x4DBF) ||
    (cp >= 0x20000 && cp <= 0x2A6DF) ||
    (cp >= 0xFF00 && cp <= 0xFFEF);
}

function tokenize(text, wordBreak) {
  const segments = [...segmenter.segment(text)];
  const tokens = [];
  for (const seg of segments) {
    if (!seg.isWordLike) {
      tokens.push({ text: seg.segment, breakable: false });
    } else if (isCJKCodePoint(seg.segment.codePointAt(0) ?? 0) && wordBreak !== 'keep-all') {
      for (const char of seg.segment) {
        tokens.push({ text: char, breakable: true });
      }
    } else {
      tokens.push({ text: seg.segment, breakable: true });
    }
  }
  return tokens;
}

function computeLines(tokens, widths, maxWidth, overflowWrap, ctx, fontStr) {
  const lines = [[]];
  let lineW = 0;
  let pendingSpace = 0;

  for (let i = 0; i < tokens.length; i++) {
    const token = tokens[i];
    const w = widths[i];

    if (!token.breakable) {
      pendingSpace = w;
      lines[lines.length - 1].push(token.text);
      continue;
    }

    if (lineW > 0 && lineW + pendingSpace + w > maxWidth) {
      if (overflowWrap === 'break-word' && w > maxWidth) {
        lines.push([]);
        lineW = 0;
        pendingSpace = 0;
        const graphemes = Array.from(token.text);
        for (const g of graphemes) {
          ctx.font = fontStr;
          const gw = ctx.measureText(g).width;
          if (lineW > 0 && lineW + gw > maxWidth) {
            lines.push([]);
            lineW = 0;
          }
          lines[lines.length - 1].push(g);
          lineW += gw;
        }
        continue;
      }
      lines.push([]);
      lineW = w;
      pendingSpace = 0;
    } else {
      lineW += pendingSpace + w;
      pendingSpace = 0;
    }
    lines[lines.length - 1].push(token.text);
  }
  return lines;
}

function measureDOMLineCount(text, fontFamily, fontSize, fontWeight, containerWidth, lineHeight) {
  const el = document.getElementById('dom-measure');
  el.style.fontFamily = fontFamily;
  el.style.fontSize = fontSize + 'px';
  el.style.fontWeight = fontWeight;
  el.style.whiteSpace = 'normal';
  el.style.wordBreak = 'normal';
  el.style.overflowWrap = 'normal';
  el.style.display = 'block';
  el.style.width = containerWidth + 'px';
  el.style.lineHeight = lineHeight + 'px';
  el.textContent = text;
  const height = el.getBoundingClientRect().height;
  return Math.round(height / lineHeight);
}

function runGate2(ctx) {
  const cjkTexts = [...CJK_TEXTS, ...MIXED_TEXTS];
  let matchCount = 0;
  let totalCount = 0;
  const mismatches = [];
  const font = { family: 'system-ui', weight: 400, size: 16 };
  const lineHeight = 24;
  const fontStr = `${font.weight} ${font.size}px ${font.family}`;

  for (const text of cjkTexts) {
    for (const containerW of CONTAINER_WIDTHS) {
      const domLines = measureDOMLineCount(text, font.family, font.size, font.weight, containerW, lineHeight);

      // Canvas 2D + Intl.Segmenter line count
      const tokens = tokenize(text, 'normal');
      ctx.font = fontStr;
      const widths = tokens.map(t => ctx.measureText(t.text).width);
      const lines = computeLines(tokens, widths, containerW, 'normal', ctx, fontStr);
      const c2dLines = lines.length;

      totalCount++;
      if (domLines === c2dLines) {
        matchCount++;
      } else {
        mismatches.push({
          text: text.length > 30 ? text.slice(0, 30) + '...' : text,
          containerW,
          domLines,
          c2dLines,
          diff: c2dLines - domLines,
        });
      }
    }
  }

  const matchRate = matchCount / totalCount;
  return {
    pass: matchRate >= 0.95,
    matchRate,
    matchCount,
    totalCount,
    mismatches: mismatches.sort((a, b) => Math.abs(b.diff) - Math.abs(a.diff)).slice(0, 20),
  };
}

// ============================================
// Gate 3: Canvas 2D + WebGL 공존
// ============================================

function runGate3(ctx) {
  try {
    // Canvas 2D 측정
    ctx.font = '16px system-ui';
    const w2d = ctx.measureText('Test').width;

    // WebGL context 생성
    const glCanvas = document.createElement('canvas');
    glCanvas.width = 100;
    glCanvas.height = 100;
    const gl = glCanvas.getContext('webgl2') || glCanvas.getContext('webgl');

    if (!gl) {
      return { pass: false, reason: 'WebGL not available' };
    }

    // WebGL 초기화 후 Canvas 2D 재측정
    const w2dAfter = ctx.measureText('Test').width;

    // WebGL cleanup
    gl.getExtension('WEBGL_lose_context')?.loseContext();

    return {
      pass: Math.abs(w2d - w2dAfter) < 0.001,
      w2dBefore: w2d.toFixed(4),
      w2dAfter: w2dAfter.toFixed(4),
      webglAvailable: true,
    };
  } catch (e) {
    return { pass: false, reason: e.message };
  }
}

// ============================================
// Gate 4: computeLines() 성능 (≤ 0.1ms, 500 tokens)
// ============================================

function runGate4(ctx) {
  // 500 토큰 텍스트 생성
  const words = [];
  for (let i = 0; i < 500; i++) {
    words.push(i % 5 === 0 ? '안녕하세요' : `word${i}`);
  }
  const text = words.join(' ');
  const fontStr = '400 16px system-ui';
  ctx.font = fontStr;

  // 토큰화
  const tokens = tokenize(text, 'normal');

  // 폭 캐시 warm
  const widthCache = new Map();
  const widths = tokens.map(t => {
    const cached = widthCache.get(t.text);
    if (cached !== undefined) return cached;
    ctx.font = fontStr;
    const w = ctx.measureText(t.text).width;
    widthCache.set(t.text, w);
    return w;
  });

  // computeLines 성능 측정 (warm cache)
  const iterations = 1000;
  const t0 = performance.now();
  for (let i = 0; i < iterations; i++) {
    computeLines(tokens, widths, 300, 'normal', ctx, fontStr);
  }
  const t1 = performance.now();
  const avgMs = (t1 - t0) / iterations;

  // 토큰화 + 폭 측정 (cold) 성능
  const coldIterations = 100;
  const tc0 = performance.now();
  for (let i = 0; i < coldIterations; i++) {
    const toks = tokenize(text, 'normal');
    ctx.font = fontStr;
    const ws = toks.map(t => ctx.measureText(t.text).width);
    computeLines(toks, ws, 300, 'normal', ctx, fontStr);
  }
  const tc1 = performance.now();
  const coldAvgMs = (tc1 - tc0) / coldIterations;

  return {
    pass: avgMs <= 0.1,
    tokenCount: tokens.length,
    uniqueTokens: widthCache.size,
    computeLinesMs: avgMs.toFixed(4),
    coldFullMs: coldAvgMs.toFixed(2),
    iterations,
  };
}

// ============================================
// Gate 5: Break Hint \n + CanvasKit 호환성 확인
// ============================================

function runGate5(ctx) {
  // CanvasKit 없이 확인 가능한 부분: \n 삽입 후 텍스트 무결성
  const testCases = [
    { text: 'Hello World Test', maxW: 80 },
    { text: '안녕하세요 세계입니다 테스트', maxW: 100 },
    { text: 'React 19 컴포넌트 개발 가이드', maxW: 120 },
  ];

  const results = [];
  const fontStr = '400 16px system-ui';
  ctx.font = fontStr;

  for (const tc of testCases) {
    const tokens = tokenize(tc.text, 'normal');
    const widths = tokens.map(t => {
      ctx.font = fontStr;
      return ctx.measureText(t.text).width;
    });
    const lines = computeLines(tokens, widths, tc.maxW, 'normal', ctx, fontStr);
    const hintedText = lines.map(l => l.join('')).join('\n');

    // 무결성: \n 제거하면 원본과 동일해야 함
    const restored = hintedText.replace(/\n/g, '');
    const original = tc.text.replace(/\s+/g, '');
    // 공백 차이는 허용 (trailing space 제거)
    const normalizedRestored = restored.replace(/\s+/g, '');
    const normalizedOriginal = original;

    const intact = normalizedRestored === normalizedOriginal;

    results.push({
      text: tc.text,
      maxW: tc.maxW,
      lineCount: lines.length,
      hintedText,
      intact,
      note: `CanvasKit drawParagraph() 테스트는 dev 서버에서 별도 확인 필요`,
    });
  }

  const allIntact = results.every(r => r.intact);
  return {
    pass: allIntact,
    note: 'Break Hint 텍스트 무결성 확인 (CanvasKit 렌더링은 dev 서버에서 확인)',
    results,
  };
}

// ============================================
// Main Benchmark Runner
// ============================================

async function runBenchmark() {
  const btn = document.getElementById('runBtn');
  const statusEl = document.getElementById('status');
  const resultsEl = document.getElementById('results');
  const summaryEl = document.getElementById('summary');

  btn.disabled = true;
  resultsEl.innerHTML = '';
  summaryEl.innerHTML = '';
  statusEl.textContent = 'Running benchmark...';

  // Wait for fonts
  await document.fonts.ready;
  statusEl.textContent = 'Fonts loaded. Running Gate 1...';

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');

  await new Promise(r => setTimeout(r, 50));

  // Gate 1
  statusEl.textContent = 'Gate 1: Canvas 2D vs CSS DOM width...';
  const g1 = runGate1(ctx);
  await new Promise(r => setTimeout(r, 10));

  // Gate 2
  statusEl.textContent = 'Gate 2: Intl.Segmenter CJK line-break...';
  const g2 = runGate2(ctx);
  await new Promise(r => setTimeout(r, 10));

  // Gate 3
  statusEl.textContent = 'Gate 3: Canvas 2D + WebGL coexistence...';
  const g3 = runGate3(ctx);

  // Gate 4
  statusEl.textContent = 'Gate 4: computeLines() performance...';
  const g4 = runGate4(ctx);

  // Gate 5
  statusEl.textContent = 'Gate 5: Break Hint integrity...';
  const g5 = runGate5(ctx);

  statusEl.textContent = 'Complete.';

  // Render Results
  let html = '';

  // Gate 1
  html += `<h2>Gate 1: Canvas 2D vs CSS DOM width ≤ 1px</h2>`;
  html += `<div class="gate ${g1.pass ? 'pass' : 'fail'}">
    ${g1.pass ? '✓ PASS' : '✗ FAIL'} — max diff: ${g1.maxDiff.toFixed(3)}px, avg: ${g1.avgDiff.toFixed(3)}px, >1px: ${g1.failCount}/${g1.total}
  </div>`;
  if (g1.outliers.length > 0) {
    html += `<details><summary>Outliers (diff > 0.5px, top 20)</summary><table>
      <tr><th>Text</th><th>Font</th><th>DOM</th><th>Canvas2D</th><th>Diff</th></tr>
      ${g1.outliers.map(o => `<tr><td>${escHtml(o.text)}</td><td>${o.font}</td><td class="num">${o.domW}</td><td class="num">${o.c2dW}</td><td class="num ${parseFloat(o.diff) > 1 ? 'err' : 'warn'}">${o.diff}</td></tr>`).join('')}
    </table></details>`;
  }

  // Gate 2
  html += `<h2>Gate 2: Intl.Segmenter CJK line-break match (≥ 95%)</h2>`;
  html += `<div class="gate ${g2.pass ? 'pass' : 'fail'}">
    ${g2.pass ? '✓ PASS' : '✗ FAIL'} — match: ${(g2.matchRate * 100).toFixed(1)}% (${g2.matchCount}/${g2.totalCount})
  </div>`;
  if (g2.mismatches.length > 0) {
    html += `<details><summary>Mismatches (top 20)</summary><table>
      <tr><th>Text</th><th>Width</th><th>DOM lines</th><th>C2D lines</th><th>Diff</th></tr>
      ${g2.mismatches.map(m => `<tr><td>${escHtml(m.text)}</td><td class="num">${m.containerW}</td><td class="num">${m.domLines}</td><td class="num">${m.c2dLines}</td><td class="num ${m.diff !== 0 ? 'err' : ''}">${m.diff > 0 ? '+' : ''}${m.diff}</td></tr>`).join('')}
    </table></details>`;
  }

  // Gate 3
  html += `<h2>Gate 3: Canvas 2D + WebGL coexistence</h2>`;
  html += `<div class="gate ${g3.pass ? 'pass' : 'fail'}">
    ${g3.pass ? '✓ PASS' : '✗ FAIL'} — ${g3.reason || `2D before: ${g3.w2dBefore}, after WebGL: ${g3.w2dAfter}`}
  </div>`;

  // Gate 4
  html += `<h2>Gate 4: computeLines() ≤ 0.1ms (500 tokens, cache warm)</h2>`;
  html += `<div class="gate ${g4.pass ? 'pass' : 'fail'}">
    ${g4.pass ? '✓ PASS' : '✗ FAIL'} — ${g4.computeLinesMs}ms (warm, ${g4.iterations} iterations), cold full: ${g4.coldFullMs}ms
    <div class="detail">${g4.tokenCount} tokens, ${g4.uniqueTokens} unique</div>
  </div>`;

  // Gate 5
  html += `<h2>Gate 5: Break Hint \\n text integrity</h2>`;
  html += `<div class="gate ${g5.pass ? 'pass' : 'fail'}">
    ${g5.pass ? '✓ PASS' : '✗ FAIL'} — ${g5.note}
  </div>`;
  html += `<details><summary>Break Hint details</summary><table>
    <tr><th>Text</th><th>maxW</th><th>Lines</th><th>Hinted</th><th>Intact</th></tr>
    ${g5.results.map(r => `<tr><td>${escHtml(r.text)}</td><td class="num">${r.maxW}</td><td class="num">${r.lineCount}</td><td><code>${escHtml(r.hintedText)}</code></td><td class="${r.intact ? 'ok' : 'err'}">${r.intact ? '✓' : '✗'}</td></tr>`).join('')}
  </table></details>`;

  resultsEl.innerHTML = html;

  // Summary
  const gates = [g1, g2, g3, g4, g5];
  const allPass = gates.every(g => g.pass);
  summaryEl.className = '';
  summaryEl.style.background = allPass ? '#052e16' : '#450a0a';
  summaryEl.style.border = `2px solid ${allPass ? '#16a34a' : '#dc2626'}`;
  summaryEl.style.color = allPass ? '#4ade80' : '#f87171';
  summaryEl.innerHTML = allPass
    ? '✓ ALL GATES PASSED — Phase A 착수 가능 (Go)'
    : `✗ ${gates.filter(g => !g.pass).length}/5 GATE(S) FAILED — Phase A 착수 불가 (No-Go)`;

  // Console output for copy
  console.log('=== ADR-051 Phase 0 Results ===');
  console.log('Gate 1 (width ≤1px):', g1.pass ? 'PASS' : 'FAIL', `max=${g1.maxDiff.toFixed(3)}px avg=${g1.avgDiff.toFixed(3)}px fail=${g1.failCount}/${g1.total}`);
  console.log('Gate 2 (CJK match):', g2.pass ? 'PASS' : 'FAIL', `${(g2.matchRate*100).toFixed(1)}% (${g2.matchCount}/${g2.totalCount})`);
  console.log('Gate 3 (coexist):', g3.pass ? 'PASS' : 'FAIL');
  console.log('Gate 4 (perf):', g4.pass ? 'PASS' : 'FAIL', `${g4.computeLinesMs}ms warm, ${g4.coldFullMs}ms cold`);
  console.log('Gate 5 (hint):', g5.pass ? 'PASS' : 'FAIL');
  console.log('VERDICT:', allPass ? 'GO' : 'NO-GO');

  btn.disabled = false;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g, '\\n');
}
</script>
</body>
</html>

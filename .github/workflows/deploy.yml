name: Deploy

on:
  push:
    branches:
      - main

# GitHub Pages 배포를 위한 권한 설정
permissions:
  contents: write # gh-pages 브랜치에 푸시하기 위해 필요

# 동시 배포 방지
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # package.json의 "packageManager" 필드에서 pnpm 버전 자동 감지

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      # Rust WASM 빌드 (Taffy 레이아웃 엔진)
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/builder/src/builder/workspace/canvas/wasm/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/builder/src/builder/workspace/canvas/wasm/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Build Rust WASM
        run: pnpm wasm:build

      - name: Verify lockfile sync and install dependencies
        run: |
          echo "Verifying pnpm-lock.yaml is in sync with package.json..."
          if ! pnpm install --frozen-lockfile 2>&1 | tee /tmp/install.log; then
            echo "::error::pnpm-lock.yaml is out of sync with package.json"
            echo "::error::Run 'pnpm install' locally, commit the updated pnpm-lock.yaml, and push."
            cat /tmp/install.log
            exit 1
          fi

      - name: Cache turbo build
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build project
        run: pnpm turbo run build --filter=@xstudio/builder
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # VITE_GROQ_API_KEY: 클라이언트 번들에 포함되면 보안 위험 — 런타임 입력 또는 백엔드 프록시 사용
          VITE_USE_WEBGL_CANVAS: "true"
          VITE_FEATURE_FILL_V2: "true"
          # VITE_CANVAS_COMPARE_MODE: 프로덕션에서는 기본값 false 사용 (디버그 전용)

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/builder/dist
          publish_branch: gh-pages
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
